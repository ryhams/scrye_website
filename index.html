<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scrye</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }
    h1 { font-size: 3rem; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 16px; }
    p { font-size: 1.1rem; color: #aaaaaa; max-width: 480px; line-height: 1.6; margin-bottom: 32px; }
    .badge {
      display: inline-block;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.9rem;
      color: #aaaaaa;
      text-decoration: none;
    }
    .badge:hover { border-color: #666; color: #fff; }
    footer { position: fixed; bottom: 24px; font-size: 0.8rem; color: #444; }
    footer a { color: #444; text-decoration: none; margin: 0 8px; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>
  <h1>Scrye</h1>
  <p>A screen time app built to help you reclaim your time and build healthier habits.</p>
  <a class="badge" href="#">Coming soon to the App Store</a>
  <footer>
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Service</a>
  </footer>
</body>
</html>
